    <style>

<body>

<div class="dashboard">
    <header>
        <h1>⏱️ Worktime Engine</h1>
        <a href="arbeit.html" class="nav-btn">📸 Wo wir arbeiten</a>
    </header>

    <div id="holidayBanner" class="holiday-banner">
        🇦🇹 Hinweis: Heute ist ein gesetzlicher Feiertag in Österreich: <span id="holidayName"></span>
    </div>

    <div class="grid">
        <div class="card">
            <h2>Zeiterfassung</h2>
            <div class="form-group">
                <label for="vorname">Vorname</label>
                <input type="text" id="vorname" placeholder="z. B. Max">
            </div>
            <div class="form-group">
                <label for="nachname">Nachname</label>
                <input type="text" id="nachname" placeholder="z. B. Muster">
            </div>
            <div class="actions">
                <button class="btn-in" onclick="stempeln('Kommen')">Kommen</button>
                <button class="btn-out" onclick="stempeln('Gehen')">Gehen</button>
            </div>
        </div>

        <div class="card">
            <h2>Live-Monitoring</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Mitarbeiter</th>
                            <th>Status</th>
                            <th>Datum</th>
                            <th>Uhrzeit</th>
                        </tr>
                    </thead>
                    <tbody id="logTabelle">
                        <tr>
                            <td colspan="4" style="text-align: center; color: var(--text-light);">Lade Daten aus Supabase...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // Initialisiere Supabase Client mit den Daten von ganz oben
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.addEventListener("DOMContentLoaded", () => {
        pruefeFeiertage();
        ladeSupabaseDaten();
    });

    async function pruefeFeiertage() {
        try {
            const jahr = new Date().getFullYear();
            const response = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${jahr}/AT`);
            const feiertage = await response.json();
            const heuteString = new Date().toISOString().split('T')[0];
            const heutigerFeiertag = feiertage.find(f => f.date === heuteString);
            if (heutigerFeiertag) {
                document.getElementById('holidayName').innerText = heutigerFeiertag.localName;
                document.getElementById('holidayBanner').style.display = 'block';
            }
        } catch (error) {
            console.error("Feiertags-API Fehler", error);
        }
    }

    async function ladeSupabaseDaten() {
        const { data, error } = await supabaseClient
            .from('zeiterfassung')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(20);

        if (error) {
            console.error("Fehler beim Laden:", error);
            return;
        }

        const tabelle = document.getElementById('logTabelle');
        tabelle.innerHTML = "";

        if(data.length === 0) {
            tabelle.innerHTML = `<tr><td colspan="4" style="text-align: center; color: var(--text-light);">Noch keine Einträge vorhanden.</td></tr>`;
            return;
        }

        data.forEach(eintrag => {
            const neueZeile = tabelle.insertRow();
            const badgeClass = eintrag.status === 'Kommen' ? 'badge-in' : 'badge-out';
            neueZeile.innerHTML = `
                <td style="font-weight: 500;">${eintrag.vorname} ${eintrag.nachname}</td>
                <td><span class="badge ${badgeClass}">${eintrag.status}</span></td>
                <td>${eintrag.datum}</td>
                <td style="color: var(--text-light); font-variant-numeric: tabular-nums;">${eintrag.uhrzeit}</td>
            `;
        });
    }

    async function stempeln(status) {
        const vorname = document.getElementById('vorname').value.trim();
        const nachname = document.getElementById('nachname').value.trim();

        if (!vorname || !nachname) {
            alert("Bitte Vor- und Nachnamen eingeben.");
            return;
        }

        const jetzt = new Date();
        const datum = jetzt.toLocaleDateString('de-AT', { day: '2-digit', month: '2-digit', year: 'numeric' });
        const uhrzeit = jetzt.toLocaleTimeString('de-AT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        const { error } = await supabaseClient
            .from('zeiterfassung')
            .insert([{ vorname, nachname, status, datum, uhrzeit }]);

        if (error) {
            alert("Fehler beim Speichern: " + error.message);
        } else {
            ladeSupabaseDaten();
        }
    }
</script>

</body>
